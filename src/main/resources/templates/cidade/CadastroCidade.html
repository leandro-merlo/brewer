<!DOCTYPE html>
<html lang="pt-BR" xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:brewer="http://manzatech.org/layout"
      layout:decorate="~{layout/DefaultLayout}"
>
<head>
    <title>Cadastro de Cidade</title>
</head>
<!-- Main content -->

<h1 layout:fragment="headerTitle">
    Cadastro de cidade
    <small>{Nova}</small>
</h1>

<section layout:fragment="conteudo" >

    <form method="POST" th:object="${cidade}" class="form-vertical  js-form-loading  cadastro-cerveja-form">

        <brewer:message />

        <div class="row">
            <div class="form-group  col-sm-4  required">
                <label for="input-cidade-estado" class="control-label">Estado</label>
                <select id="input-cidade-estado" class="form-control" th:field="*{estado}">
                    <option value="">Selecione um Estado</option>
                    <option th:each="estado : ${estados}" th:value="${estado.id}" th:text="${estado.nome}"></option>
                </select>
            </div>
            <div class="form-group  col-sm-8  required">
                <label for="input-cidade-nome" class="control-label">Nome</label>
                <input id="input-cidade-nome" type="text" class="form-control" th:field="*{nome}">
            </div>
        </div>

        <div>
            <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
    </form>

</section>
<!-- /.content -->

</body>
</html>
