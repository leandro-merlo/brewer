<!DOCTYPE html>
<html lang="pt-BR"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
>
<body>

<div class="alert alert-success alert-dismissable" role="alert" th:if="${not #strings.isEmpty(mensagem)}" th:fragment="validationSuccessMessage">
    <button type="button" class="close" data-dismiss="alert">
        <span aria-hidden="true">&times</span>
    </button>
    <div><i class="fa fa-check-circle"></i> [[${mensagem}]]</div>
</div>

</body>

</html>
