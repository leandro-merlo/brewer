<!DOCTYPE html>
<html lang="pt-BR"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
>
<body>

<th:block th:fragment="order(pagina, propriedade, texto)">
    <a th:href="${pagina.urlOrdenada(propriedade)}" th:remove="${pagina.empty} ? tag">
        <span th:text="${texto}"></span>
        <span class="dropup" th:remove="${!pagina.isAscending(propriedade)} ? tag" th:if="${pagina.isOrdered(propriedade)}">
        <span class="caret"></span>
    </span>
    </a>
</th:block>

</body>

</html>
