<!DOCTYPE html>
<html lang="pt-BR"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Brewer - Login</title>
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
    <link rel="shortcut icon" th:href="@{/layout/img/favicon.png}" />
    <link rel="stylesheet" href="../../static/layout/vendor/bootstrap/css/bootstrap.min.css" th:href="@{/layout/vendor/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" href="../../static/layout/vendor/font-awesome/css/font-awesome.min.css" th:href="@{/layout/vendor/font-awesome/css/font-awesome.min.css}">
    <link rel="stylesheet" href="../../static/layout/vendor/Ionicons/css/ionicons.min.css" th:href="@{/layout/vendor/Ionicons/css/ionicons.min.css}">
    <link rel="stylesheet" href="../../static/layout/css/AdminLTE.min.css" th:href="@{/layout/css/AdminLTE.min.css}">
    <link rel="stylesheet" href="../../static/layout/css/skins/skin-blue.min.css" th:href="@{/layout/css/skins/skin-blue.min.css}">
    <link rel="stylesheet" href="../../static/css/custom.css" th:href="@{/css/custom.css}">

    <!--[if lt IE 9]>
    <script src="../../static/layout/vendor/html5shiv/html5shiv.min.js" th:src="@{/layout/vendor/html5shiv/html5shiv.min.js}"></script>
    <script src="../../static/layout/vendor/respond/respond.min.js" th:src="@{/layout/vendor/respond/respond.min.js}"></script>
    <![endif]-->

    <link rel="stylesheet"
          href="../../static/layout/vendor/SourceSansPro/SourceSansPro.css" th:href="@{/layout/vendor/SourceSansPro/SourceSansPro.css}">
</head>

<body class="hold-transition login-page">
<div class="login-box">
    <div class="login-logo">
        <span><img th:src="@{/layout/img/brewer-logo-gray.png}" height="36px" style="margin-top: -8px"/> <span style="color: #696969;">Brewer!</span></span>
    </div>
    <div class="callout callout-danger" th:if="${#bools.isTrue(param.error)}">
        Usuário e/ou senha inválido(s)
    </div>
    <!-- /.login-logo -->
    <div class="login-box-body">
        <p class="login-box-msg">Por favor, faça o seu login</p>

        <form th:action="@{/login}" method="post">
            <div class="form-group has-feedback">
                <input class="form-control" placeholder="Seu email" autofocus name="username">
                <span class="glyphicon glyphicon-envelope form-control-feedback"></span>
            </div>
            <div class="form-group has-feedback">
                <input type="password" class="form-control" placeholder="Sua senha" name="password">
                <span class="glyphicon glyphicon-lock form-control-feedback"></span>
            </div>
            <div class="row">
                <!-- /.col -->
                <div class="col-xs-4 pull-right">
                    <button type="submit" class="btn btn-primary btn-block btn-flat">Entrar</button>
                </div>
                <!-- /.col -->
            </div>
        </form>

        <a href="#">Esqueci a minha senha</a><br>

    </div>
    <!-- /.login-box-body -->
</div>
<!-- /.login-box -->

<!-- jQuery 3 -->
<script src="../../static/layout/vendor/jquery/jquery.min.js" th:src="@{/layout/vendor/jquery/jquery.min.js}"></script>
<!-- Bootstrap 3.3.7 -->
<script src="../../static/layout/vendor/bootstrap/js/bootstrap.min.js" th:src="@{/layout/vendor/bootstrap/js/bootstrap.min.js}"></script>
<!-- AdminLTE App -->
<script src="../../static/layout/js/adminlte.min.js" th:src="@{/layout/js/adminlte.min.js}"></script>

<!-- Brewer -->
<script src="../../static/layout/js/brewer.min.js" th:src="@{/layout/js/brewer.js}"></script>

<!-- Optionally, you can add Slimscroll and FastClick plugins.
     Both of these plugins are recommended to enhance the
     user experience. -->
</body>
</html>
