<!DOCTYPE html>
<html lang="pt-BR" xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/DefaultLayout}"
      xmlns:brewer="http://brewer.manzatech.org/"
>
<head>
    <title>Pesquisar Clientes</title>
</head>

<!-- Main content -->

<h1 layout:fragment="headerTitle">
    Pesquisar Clientes
    <div style="margin-left: 10px; display: inline-block">
        <a th:href="@{/clientes/novo}" class="btn btn-default">
            <span class="glyphicon glyphicon-plus-sign"></span> Novo</a>
    </div>
</h1>

<section layout:fragment="conteudo" >
    <form method="GET" th:object="${clienteFilter}">
        <div class="row">
            <div class="form-group col-sm-8">
                <label for="nome" class="control-label">Nome</label>
                <input type="text" class="form-control" id="nome" th:field="*{nome}">
            </div>
            <div class="form-group col-sm-4">
                <label for="documento" class="control-label">CPF / CNPJ</label>
                <input type="text" class="form-control" id="documento" autofocus="autofocus" th:field="*{documento}">
            </div>
        </div>
        <div >
            <button class="btn btn-primary" type="submit">Pesquisar</button>
        </div>
    </form>
    <div class="box" style="margin-top: 15px">
        <div class="box-header">
            <h3 class="box-title">Clientes</h3>
        </div>
        <div class="table-responsive">
            <table class="table table-hover bw-simple-table">
                <thead>
                    <tr>
                        <th class="table-clientes-col-nome">
                            <brewer:order page="${pagina}" field="nome" text="Nome" />
                        </th>
                        <th class="table-clientes-col-tipo-pessoa">
                            <brewer:order page="${pagina}" field="tipoPessoa" text="Tipo Pessoa" />
                        </th>
                        <th class="table-clientes-col-cpfcnpj">CPF / CNPJ</th>
                        <th class="table-clientes-col-estado">Estado</th>
                        <th class="table-clientes-col-cidade">Cidade</th>
                        <th class="table-clientes-col-telefone">Telefone</th>
                        <th class="table-clientes-col-acoes"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="cliente : ${pagina.content}">
                        <td th:text="${cliente.nome}"></td>
                        <td class="text-center" th:text="${cliente.tipoPessoa}"></td>
                        <td class="text-right" th:text="${cliente.cpfCnpj}"></td>
                        <td class="text-center" th:text="${cliente.endereco.temCidade() ? cliente.endereco.cidade.estado.sigla : 'NC'}"></td>
                        <td class="text-center" th:text="${cliente.endereco.temCidade() ? cliente.endereco.cidade.nome : 'Não cadastrado'}"></td>
                        <td class="text-right" th:text="${cliente.telefone}"></td>
                        <td class="text-center">
                            <a href="" class="btn btn-link btn-xs" title="Editar">
                                <i class="glyphicon glyphicon-pencil"></i>
                            </a>
                            <a href="" class="btn btn-link btn-xs" title="Excluir">
                                <i class="glyphicon glyphicon-trash"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${pagina.empty}">
                        <td colspan="7" class="text-center">Nenhum cliente encontrado</td>
                    </tr>
                </tbody>
            </table>
            <brewer:pagination  page="${pagina}" />
        </div>
    </div>

</section>

<div layout:fragment="footer-scripts" th:remove="tag">
    <script th:src="@{/layout/vendor/inputmask/inputmask.min.js}" src="../../static/layout/vendor/inputmask/inputmask.min.js"></script>
    <script th:src="@{/layout/vendor/inputmask/jquery.inputmask.min.js}" src="../../static/layout/vendor/inputmask/jquery.inputmask.min.js"></script>
    <script th:src="@{/layout/vendor/inputmask/inputmask.numeric.extensions.min.js}" src="../../static/layout/vendor/inputmask/inputmask.numeric.extensions.min.js"></script>
</div>
