<!DOCTYPE html>
<html lang="pt-BR"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<body>

<!-- Modal -->
<div class="modal fade" id="modalCadastroRapidoEstilo" tabindex="-1" role="dialog" th:fragment="cadastroEstiloRapido">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal"><span aria-hidden="true">&times;</span>
                </button>
                <h4 class="modal-title" id="myModalLabel">Cadastrar estilo</h4>
            </div>
            <div class="modal-body">
                <div class="alert alert-danger hidden js-mensagem-erro-estilo-rapido" role="alert"></div>
                <form class="form-horizontal" th:action="@{/estilos}" method="post">
                    <div class="form-group row">
                        <label for="input-estilo-rapido-nome" class="control-label col-sm-2">Estilo</label>
                        <div class="col-sm-10">
                            <input type="text" id="input-estilo-rapido-nome" class="form-control"/>
                        </div>
                    </div>
                    <div class="text-right">
                        <button type="submit" class="btn btn-primary js-btn-salvar-cadastro-estilo-rapido">Cadastrar</button>
                        <button type="button" class="btn btn-default" data-dismiss="modal">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>


</body>
</html>
